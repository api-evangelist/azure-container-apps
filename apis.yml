aid: azure-container-apps
name: Azure Container Apps
description: >-
  Azure Container Apps is a serverless container service for running
  microservices and containerized applications with built-in autoscaling,
  traffic splitting, and Dapr integration. It enables developers to deploy
  containers without managing complex infrastructure while supporting
  event-driven architectures and microservices patterns.
