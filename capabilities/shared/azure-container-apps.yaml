naftiko: "1.0.0-alpha1"

info:
  label: "Azure Container Apps"
  description: "Serverless container platform for running microservices and containerized applications with autoscaling, traffic splitting, and Dapr integration."
  tags:
    - Azure
    - Containers
    - Microservices
    - Serverless
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-container-apps
      baseUri: https://management.azure.com
      description: "Azure Container Apps Resource Manager REST API"
      authentication:
        type: bearer
        token: "{{AZURE_ACCESS_TOKEN}}"
      resources:
        - name: container-apps
          path: /subscriptions/{subscriptionId}/providers/Microsoft.App/containerApps
          description: "Manage container apps"
          operations:
            - name: list-container-apps
              method: GET
              description: "List all container apps in subscription"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-container-app
              method: PUT
              description: "Create or update a container app"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: containerAppName
                  in: path
                  type: string
                  required: true
                  description: "Container app name"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  location: "{{tools.location}}"
                  properties:
                    environmentId: "{{tools.environmentId}}"
            - name: delete-container-app
              method: DELETE
              description: "Delete a container app"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: containerAppName
                  in: path
                  type: string
                  required: true
                  description: "Container app name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: managed-environments
          path: /subscriptions/{subscriptionId}/providers/Microsoft.App/managedEnvironments
          description: "Manage container app environments"
          operations:
            - name: list-environments
              method: GET
              description: "List all managed environments"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: jobs
          path: /subscriptions/{subscriptionId}/providers/Microsoft.App/jobs
          description: "Manage container app jobs"
          operations:
            - name: list-jobs
              method: GET
              description: "List all container app jobs"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: azure-container-apps-api
      resources:
        - path: /v1/container-apps
          name: container-apps
          description: "Manage Azure Container Apps"
          operations:
            - method: GET
              name: list-container-apps
              description: "List all container apps"
              call: "azure-container-apps.list-container-apps"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/environments
          name: environments
          description: "Manage container app environments"
          operations:
            - method: GET
              name: list-environments
              description: "List all managed environments"
              call: "azure-container-apps.list-environments"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: azure-container-apps-mcp
      transport: http
      tools:
        - name: list-container-apps
          description: "List all Azure Container Apps in a subscription"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-apps.list-container-apps"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-container-app
          description: "Create or update an Azure Container App"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "azure-container-apps.create-container-app"
          with:
            subscriptionId: "tools.subscriptionId"
            resourceGroupName: "tools.resourceGroupName"
            containerAppName: "tools.containerAppName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-container-app
          description: "Delete an Azure Container App"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "azure-container-apps.delete-container-app"
          with:
            subscriptionId: "tools.subscriptionId"
            resourceGroupName: "tools.resourceGroupName"
            containerAppName: "tools.containerAppName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-environments
          description: "List all Azure Container Apps managed environments"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-apps.list-environments"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-jobs
          description: "List all Azure Container App jobs"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-container-apps.list-jobs"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
